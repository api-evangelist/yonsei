    name: Yonsei Research Information Portal (Elsevier Pure)
    description: >-
      Yonsei University's research information system is built on Elsevier Pure,
      publishing organizations, researcher profiles, projects, and research
      outputs. Pure platforms typically expose an OAI-PMH endpoint (/ws/oai) and
      a REST API (/ws/api), but on this instance both return HTTP 401 and are
      not publicly accessible without credentials or IP allow-listing.
    humanURL: https://yonsei.elsevierpure.com/
