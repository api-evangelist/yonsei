---
aid: yonsei
name: Yonsei University
description: >-
  Yonsei University is a private research university in Seoul, South Korea,
  founded in 1885 and ranked #73 in the QS World University Rankings 2025. Its
  public, machine-readable footprint is limited and primarily research- and
  library-oriented: the Yonsei Research Information portal runs on Elsevier Pure
  (which exposes Pure OAI-PMH and REST endpoints, but they require
  credentials/IP allow-listing and return HTTP 401 publicly), and the medical
  library operates a DSpace 5.5 institutional repository (YUHSpace) whose RSS
  feed is publicly reachable while its OAI-PMH/REST paths are not currently
  resolvable. No official, documented public developer portal or open API was
  confirmed; the only related GitHub presence is a student-run Google Developer
  Group (gdg-yonsei), not an official institutional API organization.
